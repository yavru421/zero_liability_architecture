<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Zero-Liability Architecture™ | Dondlinger GC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Lilita+One&display=swap" rel="stylesheet">
    <base href="/" />
    
    <!-- Apple PWA Standalone Mode Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="icon-192.png" />
    <link href="ZeroLiabilityArchitecture.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    
    <!-- Leaflet.js Mapping Library (Geofencing) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- JS Interops -->
    <script src="js/iosPwaInterop.js"></script>
    
    <script type="importmap"></script>
</head>
<body>
    <div id="app">
        <div class="shotstack-loader">
            <div class="spinner"></div>
            <span class="loading-text">Mounting Pour & Measure...</span>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" style="width: var(--blazor-load-percentage, 0%)"></div>
            </div>
            <style>
                .progress-text::after {
                    content: var(--blazor-load-percentage-text, "0") "%";
                }
            </style>
            <span class="progress-text">Loading... </span>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled exception occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">✕</a>
    </div>

    <!-- iOS Add to Home Screen Guidance -->
    <div id="ios-pwa-prompt" style="display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 16px; border-radius: 12px; z-index: 9999; text-align: center; width: 90%; max-width: 400px; font-family: sans-serif;">
        <p style="margin: 0 0 10px 0; font-size: 14px;">Install this app on your iPhone: tap the <strong>Share</strong> icon below and select <strong>Add to Home Screen</strong>.</p>
        <button onclick="document.getElementById('ios-pwa-prompt').style.display='none'" style="background: #007aff; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold;">Got it</button>
    </div>
    <script>
        // Show prompt only on iOS Safari if not in standalone mode
        const isIos = () => {
            const userAgent = window.navigator.userAgent.toLowerCase();
            return /iphone|ipad|ipod/.test(userAgent);
        };
        const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone);
        if (isIos() && !isInStandaloneMode()) {
            document.getElementById('ios-pwa-prompt').style.display = 'block';
        }
    </script>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        // Request persistent storage defensively for iOS 7-day eviction
        if (navigator.storage && navigator.storage.persist) {
            navigator.storage.persist().then(granted => {
                if (granted) console.log("Storage will not be cleared except by explicit user action");
                else console.log("Storage may be cleared by the UA under storage pressure.");
            });
        }

        navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' }).then(registration => {
            registration.onupdatefound = () => {
                const installingWorker = registration.installing;
                if (installingWorker == null) {
                    return;
                }
                installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed') {
                        if (navigator.serviceWorker.controller) {
                            // A new service worker has been installed and is ready to take over.
                            console.log('New or updated content is available. Please refresh the page to update.');
                        }
                    }
                };
            };
        });
    </script>
    <script src="js/editorInteractions.js"></script>
    <script src="js/zla-interop.js"></script>
    
    <script>
        // High-speed blob transmission stream bypass framework
        window.shotStackSaver = {
            saveAndDownloadFile: function (filename, byteBase64) {
                try {
                    // Convert base64 to byte array
                    const byteCharacters = atob(byteBase64);
                    const byteNumbers = new Array(byteCharacters.length);
                    for (let i = 0; i < byteCharacters.length; i++) {
                        byteNumbers[i] = byteCharacters.charCodeAt(i);
                    }
                    const byteArray = new Uint8Array(byteNumbers);
                    
                    // Create File object for sharing
                    const file = new File([byteArray], filename, { type: 'application/pdf' });
                    
                    // Use Web Share API if supported (critical for mobile PWA standalone mode)
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        navigator.share({
                            files: [file],
                            title: 'ShotStack Studio PDF',
                            text: 'Your compiled PDF document is ready.'
                        }).catch(err => {
                            console.log('User canceled or share failed, falling back to download:', err);
                            window.shotStackSaver.triggerFallbackDownload(filename, byteArray);
                        });
                    } else {
                        window.shotStackSaver.triggerFallbackDownload(filename, byteArray);
                    }
                } catch (error) {
                    console.error('File saving failed:', error);
                }
            },
            triggerFallbackDownload: function (filename, byteArray) {
                const blob = new Blob([byteArray], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.download = filename;
                link.href = url;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                setTimeout(() => URL.revokeObjectURL(url), 2000);
            }
        };
    </script>
</body>
</html>
